name: Check

on:
  pull_request:
  push:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Setup mise
        uses: jdx/mise-action@main
        with:
          install: true
          cache: true

      - name: Cache cargo registry
        uses: actions/cache@main
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ hashFiles('Cargo.lock') }}

      - name: Run CI checks
        run: mise run check
