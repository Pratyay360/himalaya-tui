name: Release

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  artifact-metadata: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main

      - uses: jdx/mise-action@main
        with:
          install: true
          cache: true

      - uses: Swatinem/rust-cache@master

      - name: Run CI checks
        run: mise run check

  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: himalaya-tui
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: himalaya-tui
          - target: x86_64-apple-darwin
            os: macos-13
            binary: himalaya-tui
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: himalaya-tui.exe

    steps:
      - uses: actions/checkout@main

      - uses: jdx/mise-action@main
        with:
          install: true
          cache: true

      - uses: Swatinem/rust-cache@master
        with:
          key: ${{ matrix.target }}

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@main
        with:
          name: himalaya-tui-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@master
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.binary }}
