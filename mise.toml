[tools]
rust = "latest"
cargo-binstall = "latest"
"aqua:rustsec/rustsec/cargo-audit" = "latest"
"cargo:cargo-deny" = "latest"
"cargo:cargo-dist" = "latest"
actionlint = "latest"
act = "latest"

[tasks]
# Build & check
prepare = "cargo build"
check = "cargo check"
test = "cargo test"
lint = "cargo clippy --all-targets --all-features -- -D warnings"
fmt = "cargo fmt --check"
deny = "cargo deny check"
audit = "cargo audit"
release = "cargo build --release"

